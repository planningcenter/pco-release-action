name: PCO-Release - Require Changelog Update

on:
  workflow_call:
    inputs:
      changelog-path:
        description: "Path to the changelog file that must be updated on every PR"
        required: false
        type: string
        default: "CHANGELOG.md"
      skip-label:
        description: "Label that, when applied to a PR, skips the changelog-required check"
        required: false
        type: string
        default: "skip-changelog"

jobs:
  require-changelog-update:
    if: >-
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      !contains(github.event.pull_request.labels.*.name, inputs.skip-label)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - id: changed-files
        uses: tj-actions/changed-files@v46
        with:
          files: ${{ inputs.changelog-path }}
      - if: steps.changed-files.outputs.any_changed == 'false'
        run: |
          echo "Pull Requests require an update to the ${{ inputs.changelog-path }} file. If you don't need one, add the \`${{ inputs.skip-label }}\` label to this PR."
          exit 1
