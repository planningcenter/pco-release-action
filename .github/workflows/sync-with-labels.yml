name: PCO-Release - Sync With Labels

on:
  workflow_call:
    inputs:
      cache:
        description: "Used to specify a package manager for caching in the default directory. Supported values: npm, yarn, pnpm, or '' for no caching."
        required: false
        type: string
        default: "yarn"
      package-json-path:
        description: "The path to the package.json file to version."
        required: false
        type: string
        default: "package.json"
      version-command:
        description: "The command to run to bump the version"
        required: false
        type: string
        default: "yarn version"

jobs:
  sync-with-labels:
    if: >-
      github.event.pull_request.head.ref == 'pco-release--internal' &&
      (github.event.label.name == 'pco-release-patch' ||
       github.event.label.name == 'pco-release-minor' ||
       github.event.label.name == 'pco-release-major')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: planningcenter/pco-release-action/sync-with-labels@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          cache: ${{ inputs.cache }}
          package_json_path: ${{ inputs.package-json-path }}
          version_command: ${{ inputs.version-command }}
